<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
  display: grid;
  grid-template-columns: repeat(3, 200px);
  grid-auto-rows: 200px;
  gap: 10px;
  justify-content: center;
  text-align: center;
  width: 95vh;
  height: 95vh;
  margin: 20px auto;
}

.item{
  padding: 1em;
  background-color: aqua;
  color: black;
  border-radius: 8px;
  font-size: 1.5rem;
  width: 100%;
  box-sizing: border-box;
  display: flex;             /* Flex for vertical alignment */
  flex-direction: column;    /* Stack image above text */
  align-items: center;       /* Center content horizontally */
  justify-content: center;   /* Center content vertically */
}

.item img{
  max-width:280px;           /* Image size */
  margin-bottom: 10px;       /* Space between image and text */
  border-radius: 8px;        /* Optional: rounded image */
}

    </style>
</head>
<body>
    <div class="container">
  <div class="item">
    <img src="https://via.placeholder.com/100" alt="Image 1">
    <p>Item 1</p>
  </div>
  <div class="item">
    <img src="img/babar.webp" alt="Image 2">
    <p>Item 2</p>
  </div>
  <div class="item">
    <img src="img/56.webp" alt="Image 3">
    <p>Item 3</p>
  </div>
  <!-- Add more items the same way -->
</div>

</body>
</html>
